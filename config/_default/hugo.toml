baseURL = 'https://bestend.github.io/'
copyright = "{year} JunSeok Kim"
languageCode = 'en-US'
defaultContentLanguage = 'en'
theme = 'lowkey'
title = 'JunSeok Kim'
enableRobotsTXT = true
summaryLength = 15

[pagination]
pagerSize = 5

[markup]
  [markup.highlight]
    anchorLineNos = false
    codeFences = true
    guessSyntax = false
    hl_Lines = ''
    hl_inline = false
    lineAnchors = ''
    lineNoStart = 1
    lineNos = false
    lineNumbersInTable = false
    noClasses = true
    noHl = false
    style = 'dracula'
    tabWidth = 4
